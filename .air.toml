root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main.exe"
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "web/static", "dev-tools"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "html", "yml"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = false
